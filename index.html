        :root {
            --main-blue: #00adef;
            --dark-bg: #050a14;
            --terminal-bg: rgba(0, 0, 0, 0.9);
        }

        body {
            background-color: var(--dark-bg);
            background-image: radial-gradient(circle at center, #0a1a35 0%, var(--dark-bg) 100%);
            color: #fff;
            margin: 0;
            padding: 0;
            font-family: 'Cairo', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            direction: ltr; 
        }

        /* --- تصميم الشعار بالـ CSS (دقيق ومضمون) --- */
        .brand-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin-bottom: 5px;
        }

        /* أيقونة BS */
        .bs-icon {
            position: relative;

            font-weight: 900;
            color: var(--main-blue);
            text-shadow: 0 0 15px rgba(0, 173, 239, 0.6);
            line-height: 1;
            font-family: sans-serif;
            letter-spacing: -5px;
        }

        /* زر التشغيل الصغير داخل حرف B */
        .play-btn {
            position: absolute;
            bottom: 8px;
            left: 2px;
            font-size: 1rem;
            color: #fff;
            text-shadow: none;
            letter-spacing: 0;
        }

        /* نصوص الشعار */
        .brand-text {
            display: flex;
            flex-direction: column;
            justify-content: center;
            text-align: right;
            direction: rtl; /* لضبط النص العربي مع الانجليزي */
        }

        .logo-arabic {
            font-size: 3.2rem;
            font-weight: 900;
            margin: 0;
            color: #fff;
            text-shadow: 0 0 10px var(--main-blue);
            line-height: 1.1;
        }

        .logo-english {
            font-size: 1.3rem;
            color: var(--main-blue);
            font-weight: 700;
            margin: 0;
            letter-spacing: 1px;
            line-height: 1;
        }

        .store-sub {
            font-size: 1rem;
            color: #ddd;
            margin-bottom: 25px;
            letter-spacing: 2px;
        }

        /* --- مربع الديبق --- */
        .terminal-box {
            width: 50%;
            max-width: 550px;
            height: 220px;
            background: var(--terminal-bg);
            border: 1px solid var(--main-blue);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 0 30px rgba(0, 173, 239, 0.15);
            position: relative;
        }

        @font-face {
            font-family: 'logging';
            src: url('fonts/LiberationMono-Regular.ttf');
        }

        #console {
            font-family: 'logging', monospace;
            color: #00ff00;
            font-size: 13px;
            margin: 0;
            height: 100%;
            overflow-y: auto;
            white-space: pre-wrap;
            word-wrap: break-word;
            text-align: left;
            line-height: 1.6;
        }

        .links-area {
            margin-top: 15px;
            font-size: 11px;
            z-index: 10;
        }

        .links-area a {
            color: #888;
            text-decoration: none;
        }

        /* --- تذييل الصفحة (الفوتر) المنسق --- */
        .footer {
            position: absolute;
            bottom: 20px;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            direction: rtl;
        }

        .footer-address {
            font-size: 0.9rem;
            color: #ccc;
        }

        .footer-designer {
            font-size: 1.05rem;
            color: var(--main-blue);
            font-weight: 900;
            text-shadow: 0 0 5px rgba(0, 173, 239, 0.4);
        }
    </style>

    <script>
    if (window.applicationCache.status=='0')

</head>
<body>

</html>
