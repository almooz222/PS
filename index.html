<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset='utf-8'>
    <title>بليغ ستور 2 | PSFree 9.00</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --main-blue: #00adef;
            --dark-bg: #050a14;
            --terminal-bg: rgba(0, 0, 0, 0.85);
        }

        body {
            background-color: var(--dark-bg);
            /* تأثير خلفية متدرجة فوق صورة اللعبة لدمجها */
            background-image: radial-gradient(circle at right, rgba(10, 26, 53, 0.8) 0%, var(--dark-bg) 100%);
            color: #fff;
            margin: 0;
            padding: 0;
            font-family: 'Cairo', sans-serif;
            display: flex;
            height: 100vh;
            overflow: hidden;
            direction: ltr; 
            position: relative;
        }

        /* دمج صورة Call of Duty في الشق الأيسر بأسلوب احترافي */
        .bg-game-image {
            position: absolute;
            top: 0;
            left: 0;
            width: 55%;
            height: 100%;
            background-image: url('modern-warfare-1.jpg'); /* مسار صورة اللعبة */
            background-size: cover;
            background-position: top center;
            opacity: 0.4;
            z-index: -1;
            /* عمل تدرج لوني لإخفاء حافة الصورة ودمجها مع الخلفية السوداء */
            -webkit-mask-image: linear-gradient(to right, rgba(0,0,0,1) 0%, rgba(0,0,0,0) 100%);
            mask-image: linear-gradient(to right, rgba(0,0,0,1) 0%, rgba(0,0,0,0) 100%);
        }

        /* حاوية المحتوى لضمان بقائها فوق الصورة وفي المنتصف */
        .main-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            z-index: 1;
        }

        /* تصميم الشعار المبرمج (هوية المحل) */
        .logo-container {
            text-align: center;
            margin-bottom: 25px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .logo-text {
            font-size: 3.5rem;
            font-weight: 900;
            margin: 10px 0 0 0;
            color: #fff;
            text-shadow: 0 0 10px var(--main-blue), 0 0 20px var(--main-blue);
            letter-spacing: 1px;
        }

        .store-sub {
            font-size: 1.1rem;
            color: var(--main-blue);
            margin-top: -5px;
            font-weight: 700;
            letter-spacing: 2px;
        }

        .terminal-box {
            width: 50%;
            max-width: 550px;
            height: 220px;
            background: var(--terminal-bg);
            border: 1px solid var(--main-blue);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 0 30px rgba(0, 173, 239, 0.2);
            position: relative;
            backdrop-filter: blur(5px);
        }

        @font-face {
            font-family: 'logging';
            src: url('fonts/LiberationMono-Regular.ttf');
        }

        #console {
            font-family: 'logging', monospace;
            color: #00ff00;
            font-size: 13px;
            margin: 0;
            height: 100%;
            overflow-y: auto;
            white-space: pre-wrap;
            word-wrap: break-word;
            text-align: left;
            line-height: 1.6;
        }

        .links-area {
            margin-top: 15px;
            font-size: 11px;
            opacity: 0.8;
        }

        .links-area a {
            color: var(--main-blue);
            text-decoration: none;
            border-bottom: 1px dotted var(--main-blue);
        }

        /* تذييل الصفحة وتصميم العنوان */
        .footer {
            position: absolute;
            bottom: 15px;
            width: 100%;
            text-align: center;
            font-size: 0.95rem;
            line-height: 1.8;
            opacity: 0.9;
        }

        .footer-address {
            color: #ddd;
        }

        .footer-designer {
            color: var(--main-blue);
            font-weight: 900;
            font-size: 1.05rem;
            text-shadow: 0 0 5px rgba(0, 173, 239, 0.5);
        }
    </style>

    <script>
    if (window.applicationCache.status=='0')
    {
      window.location.replace("cache.html");
    }
    </script>
</head>
<body>
    <div class="bg-game-image"></div>

    <div class="main-content">
        <div class="logo-container">
            <svg width="140" height="70" viewBox="0 0 140 70" xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <filter id="neonGlow">
                        <feGaussianBlur stdDeviation="3" result="blur" />
                        <feMerge>
                            <feMergeNode in="blur" />
                            <feMergeNode in="SourceGraphic" />
                        </feMerge>
                    </filter>
                </defs>
                <path d="M 15 15 L 45 15 C 60 15 65 25 55 35 C 70 40 70 60 45 65 L 15 65" fill="none" stroke="#00adef" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" filter="url(#neonGlow)"/>
                <polygon points="25,40 25,60 40,50" fill="#fff" filter="url(#neonGlow)"/>
                <path d="M 125 15 C 105 15 95 25 105 40 C 120 50 120 60 100 65 L 75 65" fill="none" stroke="#00adef" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" filter="url(#neonGlow)"/>
            </svg>
            <h1 class="logo-text">بليغ ستور 2</h1>
            <div class="store-sub">PSFree-Lapse Exploit Chain</div>
        </div>

        <div class="terminal-box">
            <pre id='console'>[+] Waiting for system...&#10;[+] Initializing Baligh Store 2 Host...</pre>
        </div>

        <div class="links-area">
            See <a href='./about.html' data-jslicense='1'>JavaScript license information</a>
        </div>
    </div>

    <div class="footer">
        <div class="footer-address">
            بليغ ستور | صنعاء - الخمسين - بيت بوس - خلف كافتيريا ركن الأحلام - جوار سوبر ماركت الصخرة
        </div>
        <div class="footer-designer">
            تصميم المهندس علوي محمد الحبيشي (770047367)
        </div>
    </div>

    <script type='module' src='./alert.mjs'></script>
</body>
</html>
