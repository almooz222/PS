<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset='utf-8'>
    <title>بليغ ستور 2 | PSFree 9.00</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --main-blue: #00adef;
            --dark-bg: #050a14;
            --terminal-bg: rgba(0, 0, 0, 0.9);
        }

        body {
            background-color: var(--dark-bg);
            background-image: radial-gradient(circle at center, #0a1a35 0%, var(--dark-bg) 100%);
            color: #fff;
            margin: 0;
            padding: 0;
            font-family: 'Cairo', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            direction: ltr; 
        }

        /* --- إدراج الشعار الأصلي (الصورة التي أرسلتها) --- */
        .logo-container {
            text-align: center;
            margin-bottom: 20px;
        }

        .main-logo {
            width: 320px; /* يمكنك تعديل حجم الشعار من هنا */
            max-width: 90%;
            /* هذا الفلتر يقلب لون الشعار الأسود إلى أبيض ليظهر بوضوح على الخلفية الغامقة مع إضاءة زرقاء */
            filter: invert(1) drop-shadow(0 0 10px var(--main-blue));
        }

        .store-sub {
            font-size: 1.2rem;
            color: var(--main-blue);
            margin-top: 5px;
            font-weight: 700;
            letter-spacing: 2px;
        }

        /* --- مربع الكونسول (الديبق) --- */
        .terminal-box {
            width: 50%;
            max-width: 550px;
            height: 220px;
            background: var(--terminal-bg);
            border: 1px solid var(--main-blue);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 0 30px rgba(0, 173, 239, 0.15);
            position: relative;
            z-index: 10;
        }

        @font-face {
            font-family: 'logging';
            src: url('fonts/LiberationMono-Regular.ttf');
        }

        #console {
            font-family: 'logging', monospace;
            color: #00ff00;
            font-size: 13px;
            margin: 0;
            height: 100%;
            overflow-y: auto;
            white-space: pre-wrap;
            word-wrap: break-word;
            text-align: left;
            line-height: 1.6;
        }

        /* --- الحل لمشكلة التداخل (إخفاء الروابط والمربعات البيضاء) --- */
        
        /* 1. إخفاء نص الجافاسكربت ليسنس تماماً */
        .links-area {
            display: none !important; 
        }

        /* 2. إخفاء مربعات الإدخال التي تولدها الثغرة "بصرياً فقط" لكي لا تخرب شكل الصفحة وتستمر الثغرة بالعمل */
        input {
            opacity: 0 !important;
            position: absolute !important;
            z-index: -100 !important;
            bottom: 0 !important;
            pointer-events: none;
        }

        /* --- تذييل الصفحة (الفوتر) ليكون واضحاً وبارزاً --- */
        .footer {
            position: absolute;
            bottom: 30px;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            direction: rtl; /* لضبط النص العربي */
            z-index: 10;
        }

        .footer-address {
            font-size: 1.1rem;
            color: #ffffff;
            text-shadow: 0 0 3px #000;
        }

        .footer-designer {
            font-size: 1.2rem;
            color: var(--main-blue);
            font-weight: 900;
            text-shadow: 0 0 8px rgba(0, 173, 239, 0.5);
        }
    </style>

    <script>
    if (window.applicationCache.status=='0')
    {
      window.location.replace("cache.html");
    }
    </script>
</head>
<body>

    <div class="logo-container">
        <img src="Baligh Store 2 Logo 2.png" alt="Baligh Store 2" class="main-logo">
        <div class="store-sub">PSFree-Lapse Exploit Chain</div>
    </div>

    <div class="terminal-box">
        <pre id='console'>[+] Waiting for system...&#10;[+] Initializing Baligh Store 2 Host...</pre>
    </div>

    <div class="links-area">
        See <a href='./about.html' data-jslicense='1'>JavaScript license information</a>
    </div>

    <div class="footer">
        <div class="footer-address">
            بليغ ستور | صنعاء - الخمسين - بيت بوس - خلف كافتيريا ركن الأحلام - جوار سوبر ماركت الصخرة
        </div>
        <div class="footer-designer">
            تصميم المهندس علوي محمد الحبيشي (770047367)
        </div>
    </div>

    <script type='module' src='./alert.mjs'></script>
</body>
</html>
