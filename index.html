        :root {
            --main-blue: #00adef;
            --dark-bg: #050a14;
            --terminal-bg: rgba(0, 0, 0, 0.9);
        }

        body {
            background-color: var(--dark-bg);
            background-image: radial-gradient(circle at center, #0a1a35 0%, var(--dark-bg) 100%);
            color: #fff;
            margin: 0;
            padding: 0;
            font-family: 'Cairo', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            /* الاتجاه من اليسار لليمن بناءً على طلبك */
            direction: ltr; 
        }

        /* تصميم الشعار (هوية المحل) */
        .logo-container {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo-text {
            font-size: 4rem;
            font-weight: 900;
            text-transform: uppercase;
            margin: 0;
            color: #fff;
            text-shadow: 0 0 10px var(--main-blue), 0 0 20px var(--main-blue);
            letter-spacing: 2px;
        }

        .store-sub {
            font-size: 1.2rem;
            color: var(--main-blue);
            margin-top: -10px;
            font-weight: 700;
        }

        /* تصغير وتنسيق مربع الديبق (الكونسول) ليكون متناسقاً */
        .terminal-box {
            width: 50%; /* تصغير العرض للمنتصف */
            max-width: 550px;
            height: 220px; /* تقليل الارتفاع */
            background: var(--terminal-bg);
            border: 1px solid var(--main-blue);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 0 30px rgba(0, 173, 239, 0.15);
            position: relative;
        }

        /* الخط التقني داخل الكونسول */
        @font-face {
            font-family: 'logging';
            src: url('fonts/LiberationMono-Regular.ttf');
        }

        #console {
            font-family: 'logging', monospace;
            color: #00ff00; /* لون أخضر تقني */
            font-size: 13px;
            margin: 0;
            height: 100%;
            overflow-y: auto;
            white-space: pre-wrap;
            word-wrap: break-word;
            text-align: left;
            line-height: 1.6;
        }

        /* تذييل الصفحة بتنسيق هادئ */
        .footer {
            position: absolute;
            bottom: 20px;
            width: 100%;
            text-align: center;
            font-size: 0.9rem;
            opacity: 0.7;
        }

        .footer b {
            color: var(--main-blue);
        }

        .links-area {
            margin-top: 15px;
            font-size: 11px;
        }

        .links-area a {
            color: #666;

        }
